<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý chung</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#ffffff;--card:#ffffff;--ink:#1a1a1a;--muted:#767676;--border:#e8e8e8;
  --blue:#1428A0;--blue-bg:#f0f2ff;
  --green:#2eb872;--green-bg:#edfaf4;
  --amber:#f5a623;--amber-bg:#fffbf0;
  --red:#eb4d4d;--red-bg:#fff2f2;
  --shadow:0 1px 4px rgba(0,0,0,0.06);
  --shadow-hover:0 4px 20px rgba(0,0,0,0.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;background:#fff;color:var(--ink);padding:32px 32px 60px;}
.wrap{max-width:1000px;margin:0 auto;}
.page-title{font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px;}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}

/* Loading */
.loading{text-align:center;padding:60px;color:var(--muted);font-size:14px;}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px;}
@keyframes spin{to{transform:rotate(360deg);}}

/* CLASS BAR */
.class-block{margin-bottom:1px;}
.class-bar{
  background:#fff;border:1px solid var(--border);
  border-radius:0;
  padding:18px 24px;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  transition:background .15s;
}
.class-block:first-child .class-bar{border-radius:8px 8px 0 0;}
.class-block:last-child .class-bar:not(.open){border-radius:0 0 8px 8px;}
.class-bar:hover{background:#fafafa;}
.class-bar:hover .cb-name{color:var(--blue);}
.class-bar.open{background:#fafafa;border-bottom-color:transparent;}
.cb-left{display:flex;flex-direction:column;gap:3px;}
.cb-name{font-size:15px;font-weight:600;transition:color .15s;}
.cb-meta{font-size:12px;color:var(--muted);}
.cb-right{display:flex;align-items:center;gap:20px;}
.stat-group{display:flex;gap:24px;}
.sp{display:flex;flex-direction:column;align-items:center;min-width:52px;}
.sp .sv{font-size:16px;font-weight:700;}
.sp .sk{font-size:10px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}
.sv.g{color:var(--green)}.sv.w{color:var(--amber)}.sv.b{color:var(--red)}
.chev{font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.chev.open{transform:rotate(180deg);}

/* Progress bar subtle */
.loading-bar{background:var(--border);height:2px;border-radius:1px;overflow:hidden;margin-top:8px;}
.loading-bar-fill{height:100%;background:var(--blue);animation:loadbar 1s ease-in-out infinite;}
@keyframes loadbar{0%{width:0;margin-left:0}60%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}

/* STUDENT LIST */
.student-list{display:none;background:#fff;border:1px solid var(--border);border-top:none;}
.student-list.open{display:block;}
.class-block:last-child .student-list{border-radius:0 0 8px 8px;}
.list-msg{padding:20px 24px;text-align:center;color:var(--muted);font-size:13px;}

.student-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .12s;
}
.student-row:last-child{border-bottom:none;}
.student-row:hover{background:#fafafa;}
.student-row:hover .s-name{color:var(--blue);}
.student-row.risk{background:#fffafa;}
.student-row.risk:hover{background:#fff5f5;}
.student-row.tip-open{background:var(--blue-bg);}
.s-left{display:flex;flex-direction:column;gap:2px;}
.s-name{font-size:13px;font-weight:500;transition:color .12s;}
.s-ma{font-size:10px;color:var(--muted);}
.risk-tag{display:inline-block;background:var(--red-bg);color:var(--red);font-size:9px;font-weight:600;padding:2px 6px;border-radius:2px;margin-left:8px;vertical-align:middle;}
.s-metrics{display:flex;gap:20px;}
.sm{text-align:right;min-width:56px;}
.sm .mv{font-size:13px;font-weight:600;}
.sm .mk{font-size:10px;color:var(--muted);margin-top:1px;}
.mv.ok{color:var(--green);}.mv.warn{color:var(--red);}

/* TOOLTIP */
.tip-overlay{display:none;position:fixed;inset:0;z-index:99;}
.tip-overlay.show{display:block;}
.tip-box{
  position:fixed;z-index:100;
  background:#fff;border:1px solid var(--border);
  border-radius:8px;
  box-shadow:0 8px 40px rgba(0,0,0,.12);
  padding:24px;width:360px;max-height:80vh;overflow-y:auto;
}
.tip-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.tip-name{font-size:15px;font-weight:600;}
.tip-ma{font-size:11px;color:var(--muted);margin-top:3px;}
.tip-close{background:none;color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:4px 10px;cursor:pointer;font-size:12px;transition:all .12s;}
.tip-close:hover{color:var(--red);border-color:var(--red);}
.risk-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}
.rc{font-size:10px;padding:3px 8px;border-radius:2px;font-weight:500;border:1px solid;}
.rc-bad{background:var(--red-bg);color:var(--red);border-color:#ffd0d0;}
.rc-ok{background:var(--green-bg);color:var(--green);border-color:#c5f0da;}
.tip-divider{height:1px;background:var(--border);margin:14px 0;}
.tip-sec{margin-bottom:16px;}
.tip-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px;}
.tip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.tip-m{background:#fafafa;border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;}
.tip-m .tv{font-size:16px;font-weight:700;color:var(--ink);}
.tip-m .tk{font-size:10px;color:var(--muted);margin-top:3px;}
.note-item{font-size:12px;padding:8px 12px;border-left:3px solid var(--amber);background:var(--amber-bg);border-radius:0 4px 4px 0;margin-bottom:6px;line-height:1.5;}
.note-date{font-size:10px;color:var(--amber);font-weight:600;margin-bottom:2px;}
.chart-wrap{height:150px;margin-top:10px;}
.no-data{color:var(--muted);font-size:12px;text-align:center;padding:16px 0;}

@media(max-width:600px){
  body{padding:16px;}
  .stat-group{display:none;}
  .tip-box{width:calc(100vw - 20px);left:10px!important;}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="page-title">Quản lý chung</div>
  <div class="page-sub">Tổng quan tất cả lớp · Bấm vào lớp để xem học viên · Bấm học viên để xem chi tiết</div>
  <div id="classArea">
    <div class="loading"><div class="spinner"></div><br>Đang tải dữ liệu…</div>
  </div>
</div>

<div class="tip-overlay" id="tipOverlay" onclick="handleOverlay(event)"></div>
<div class="tip-box" id="tipBox" style="display:none">
  <div class="tip-head">
    <div><div class="tip-name" id="tipName"></div><div class="tip-ma" id="tipMa"></div></div>
    <button class="tip-close" onclick="closeTip()">Đóng</button>
  </div>
  <div class="risk-chips" id="tipRisks"></div>
  <div class="tip-sec">
    <div class="tip-lbl">Chỉ số</div>
    <div class="tip-grid" id="tipMetrics"></div>
  </div>
  <div class="tip-divider"></div>
  <div class="tip-sec" id="tipNotesSec" style="display:none">
    <div class="tip-lbl">Ghi chú trong lớp</div>
    <div id="tipNotes"></div>
  </div>
  <div class="tip-sec" id="tipScoreSec" style="display:none">
    <div class="tip-lbl">Lịch sử điểm thi</div>
    <div class="chart-wrap"><canvas id="tipChart"></canvas></div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbyRg-u2xvc-6cPFxswzi5kbSNZbCjsWQ3L72dPUWsEoxaExStX_XjGOifyzC8nMGcr9EQ/exec';
let detailCache={};
let chartInst=null;
let openTipMa=null;

async function apiGet(action,params){
  const url=new URL(APPS_SCRIPT_URL);
  url.searchParams.set('action',action);
  Object.entries(params||{}).forEach(([k,v])=>url.searchParams.set(k,v));
  return (await fetch(url)).json();
}

function pCls(v,hi,lo){return v==null?'':v>=hi?'g':v<lo?'b':'w';}

async function init(){
  try{
    const allStats=await apiGet('getAllClassStats');
    const area=document.getElementById('classArea');
    area.innerHTML='';
    const wrap=document.createElement('div');
    wrap.style.border='1px solid var(--border)';
    wrap.style.borderRadius='8px';
    wrap.style.overflow='hidden';
    allStats.forEach((d,idx)=>{
      const div=document.createElement('div');
      div.className='class-block';
      div.innerHTML=`
        <div class="class-bar" id="bar-${d.lop}" onclick="toggleClass('${d.lop}')">
          <div class="cb-left">
            <div class="cb-name">${d.lop}</div>
            <div class="cb-meta">Khai giảng: ${d.ngayKhaiGiang} &nbsp;·&nbsp; Buổi ${d.soiBuoi} &nbsp;·&nbsp; Sĩ số: ${d.siSo}${d.nghiHoc?' &nbsp;·&nbsp; Nghỉ: '+d.nghiHoc:''}${d.baoLuu?' &nbsp;·&nbsp; Bảo lưu: '+d.baoLuu:''}</div>
          </div>
          <div class="cb-right">
            <div class="stat-group">
              <div class="sp"><span class="sv ${pCls(d.pctDiHoc,80,60)}">${d.pctDiHoc}%</span><span class="sk">Đi học</span></div>
              <div class="sp"><span class="sv ${pCls(d.pctTuVung,80,60)}">${d.pctTuVung}%</span><span class="sk">Từ vựng</span></div>
              <div class="sp"><span class="sv ${pCls(d.pctBuBai,80,50)}">${d.pctBuBai}%</span><span class="sk">Bù bài</span></div>
            </div>
            <span class="chev" id="chev-${d.lop}">▼</span>
          </div>
        </div>
        <div class="student-list" id="list-${d.lop}">
          <div class="list-msg">Bấm vào thanh lớp để tải danh sách học viên…</div>
        </div>`;
      wrap.appendChild(div);
    });
    area.appendChild(wrap);
  }catch(e){
    document.getElementById('classArea').innerHTML='<div class="list-msg" style="color:var(--red)">Lỗi tải dữ liệu: '+e.message+'</div>';
  }
}

async function toggleClass(lop){
  const bar=document.getElementById('bar-'+lop);
  const list=document.getElementById('list-'+lop);
  const chev=document.getElementById('chev-'+lop);
  const isOpen=list.classList.contains('open');
  if(isOpen){list.classList.remove('open');bar.classList.remove('open');chev.classList.remove('open');return;}
  list.classList.add('open');bar.classList.add('open');chev.classList.add('open');
  if(detailCache[lop]){renderStudents(lop,detailCache[lop].students);return;}
  list.innerHTML='<div class="list-msg">Đang tải…<div class="loading-bar"><div class="loading-bar-fill"></div></div></div>';
  try{
    const data=await apiGet('getDashboard',{lop});
    if(data.error){list.innerHTML='<div class="list-msg" style="color:var(--red)">'+data.error+'</div>';return;}
    detailCache[lop]=data;
    renderStudents(lop,data.students);
  }catch(e){list.innerHTML='<div class="list-msg" style="color:var(--red)">Lỗi: '+e.message+'</div>';}
}

function renderStudents(lop,students){
  const list=document.getElementById('list-'+lop);
  if(!students||!students.length){list.innerHTML='<div class="list-msg">Không có học viên.</div>';return;}
  list.innerHTML=students.map(s=>{
    const vTxt=s.tongVang?`${s.tongVang} (${s.vangCP} có phép · ${s.vangKP} không phép)`:'0';
    const avgV=s.avgVocab!==null?s.avgVocab+'%':'—';
    const avgCls=s.avgVocab!==null?(s.avgVocab>=80?'ok':'warn'):'';
    const sc=s.maxScore!==null?s.maxScore:'—';
    return `<div class="student-row${s.isRisk?' risk':''}" id="sr-${s.maHV}" onclick="toggleTip('${lop}','${s.maHV}',event)">
      <div class="s-left">
        <div class="s-name">${s.tenHV}${s.isRisk?'<span class="risk-tag">Cần chú ý</span>':''}</div>
        <div class="s-ma">${s.maHV}</div>
      </div>
      <div class="s-metrics">
        <div class="sm"><div class="mv ${s.tongVang>3?'warn':''}">${vTxt}</div><div class="mk">Vắng</div></div>
        <div class="sm"><div class="mv">${s.daBu}/${s.tongVang}</div><div class="mk">Đã bù</div></div>
        <div class="sm"><div class="mv ${avgCls}">${avgV}</div><div class="mk">Từ vựng tb</div></div>
        <div class="sm"><div class="mv">${sc}</div><div class="mk">Điểm cao nhất</div></div>
      </div>
    </div>`;
  }).join('');
}

function toggleTip(lop,maHV,event){
  event.stopPropagation();
  if(openTipMa===maHV){closeTip();return;}
  if(openTipMa) document.getElementById('sr-'+openTipMa)?.classList.remove('tip-open');
  openTipMa=maHV;
  document.getElementById('sr-'+maHV).classList.add('tip-open');
  const d=detailCache[lop];
  if(!d) return;
  const s=d.students.find(x=>x.maHV===maHV);
  if(!s) return;
  document.getElementById('tipName').textContent=s.tenHV;
  document.getElementById('tipMa').textContent=s.maHV;
  const rDefs=[
    {k:'buBai',lbl:'Chưa bù ≥3 buổi'},
    {k:'vangLienTuc',lbl:'Vắng liên tục >3'},
    {k:'vocab',lbl:'Từ vựng <80%'},
    {k:'btvn',lbl:'BTVN thiếu ≥3'}
  ];
  document.getElementById('tipRisks').innerHTML=rDefs.map(r=>
    `<span class="rc ${s.risks&&s.risks[r.k]?'rc-bad':'rc-ok'}">${s.risks&&s.risks[r.k]?'⚠':'✓'} ${r.lbl}</span>`
  ).join('');
  document.getElementById('tipMetrics').innerHTML=[
    {v:s.tongVang,k:'Buổi vắng',sub:`${s.vangCP} CP · ${s.vangKP} KP`},
    {v:`${s.daBu}/${s.tongVang}`,k:'Đã bù bài'},
    {v:s.avgVocab!==null?s.avgVocab+'%':'—',k:'Từ vựng tb'},
    {v:s.phutTre||0,k:'Phút trễ (tổng)'},
    {v:s.phutVe||0,k:'Phút về sớm'},
    {v:s.btvnThieu||0,k:'BTVN thiếu'}
  ].map(m=>`<div class="tip-m"><div class="tv">${m.v}</div><div class="tk">${m.k}</div>${m.sub?`<div class="tk" style="color:var(--muted)">${m.sub}</div>`:''}</div>`).join('');
  const notesSec=document.getElementById('tipNotesSec');
  if(s.ghiChu&&s.ghiChu.length){
    notesSec.style.display='block';
    document.getElementById('tipNotes').innerHTML=s.ghiChu.map(g=>
      `<div class="note-item"><div class="note-date">${g.ngay}</div>${g.text}</div>`
    ).join('');
  }else notesSec.style.display='none';
  const scoreSec=document.getElementById('tipScoreSec');
  if(s.scores&&s.scores.length){
    scoreSec.style.display='block';
    if(chartInst)chartInst.destroy();
    const sorted=[...s.scores].sort((a,b)=>new Date(a.ngay)-new Date(b.ngay));
    chartInst=new Chart(document.getElementById('tipChart').getContext('2d'),{
      type:'line',
      data:{
        labels:sorted.map(x=>x.test||x.ngay),
        datasets:[
          {label:'Overall',data:sorted.map(x=>x.score),borderColor:'#1428A0',backgroundColor:'rgba(20,40,160,.05)',tension:.35,pointRadius:4,pointBackgroundColor:'#1428A0'},
          {label:'Nghe',data:sorted.map(x=>x.nghe),borderColor:'#2eb872',tension:.35,pointRadius:3,hidden:true},
          {label:'Đọc',data:sorted.map(x=>x.doc),borderColor:'#f5a623',tension:.35,pointRadius:3,hidden:true}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10}}},
        scales:{y:{beginAtZero:false,ticks:{font:{size:10}}},x:{ticks:{font:{size:9}}}}
      }
    });
  }else scoreSec.style.display='none';
  const box=document.getElementById('tipBox');
  box.style.display='block';
  document.getElementById('tipOverlay').classList.add('show');
  const M=12,W=360;
  let left=event.clientX+16,top=event.clientY-16;
  if(left+W>window.innerWidth-M)left=event.clientX-W-8;
  if(left<M)left=M;
  const bH=Math.min(520,window.innerHeight*.82);
  if(top+bH>window.innerHeight-M)top=window.innerHeight-bH-M;
  if(top<M)top=M;
  box.style.left=left+'px';box.style.top=top+'px';
}

function handleOverlay(e){if(!document.getElementById('tipBox').contains(e.target))closeTip();}
function closeTip(){
  if(openTipMa)document.getElementById('sr-'+openTipMa)?.classList.remove('tip-open');
  openTipMa=null;
  document.getElementById('tipBox').style.display='none';
  document.getElementById('tipOverlay').classList.remove('show');
}
init();
</script>
</body>
</html>
